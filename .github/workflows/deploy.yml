name: deploy

on:
  workflow_call:


jobs:
  deploy:
    name: deploy
    runs-on: [self-hosted, xlarge, jammy, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup operator environment
        run: |
          if [ -n "$DOCKERHUB_MIRROR" ]; then
            MIRROR_CONFIG=/etc/containerd/hosts.d/docker.io
            sudo mkdir -p ${MIRROR_CONFIG}
            sudo chown $USER ${MIRROR_CONFIG}
            cat <<EOF > ${MIRROR_CONFIG}/hosts.toml
          [host."$DOCKERHUB_MIRROR"]
          capabilities = ["pull", "resolve"]
          EOF
          fi

          sudo apt-get remove -y docker.io containerd
          sudo rm -rf /run/containerd
          sudo iptables -P FORWARD ACCEPT
          sudo snap install --classic concierge

          cat > /tmp/concierge-k8s.yaml <<EOF
          juju:
            channel: 3.6/stable
            extra-bootstrap-args: --config bootstrap-timeout=1800 --config caas-image-repo=ghcr.io/juju
            model-defaults:
              test-mode: "true"
              automatically-retry-hooks: "true"
          providers:
            lxd:
              enable: true
              bootstrap: true
            k8s:
              enable: true
              bootstrap: false
              channel: 1.32-classic/stable
              bootstrap-constraints:
                root-disk: "10G"
              features:
                load-balancer:
                  l2-mode: "true"
                  cidrs: "10.64.140.40-10.64.140.49"
                local-storage: {}
                network: {}
          EOF

          sudo concierge --trace prepare -c /tmp/concierge-k8s.yaml
          sudo k8s status --wait-ready --timeout 5m
          kubectl config current-context
          K8S_ADDRESS=$(hostname -I | cut -d " " -f1)
          kubectl config view --raw | sed "s#https://127.0.0.1:6443#https://${K8S_ADDRESS}:6443#" | juju add-k8s ci-k8s -c concierge-lxd
          juju add-model -c concierge-lxd testing-k8s ci-k8s --no-switch
          juju controllers
          juju models -c concierge-lxd
      - name: Install dependencies
        run: |
          sudo snap install --classic terraform
          sudo snap install --classic juju-wait
      - name: Deploy MicroOVN
        run: |
          juju add-model -c concierge-lxd openstack-machines localhost --no-switch
          juju add-machine -m concierge-lxd:openstack-machines --base ubuntu@24.04
          juju wait-for machine 0 -m concierge-lxd:openstack-machines --timeout 10m
          juju deploy microovn -m concierge-lxd:openstack-machines --channel 26.03/edge --base ubuntu@24.04 --to 0
          juju deploy microcluster-token-distributor -m concierge-lxd:openstack-machines --channel v1/stable --base ubuntu@24.04 --to 0
          juju deploy sunbeam-ovn-proxy -m concierge-lxd:openstack-machines --channel 2026.1/edge --base ubuntu@24.04 --to 0
          juju integrate -m concierge-lxd:openstack-machines microovn:cluster microcluster-token-distributor:microcluster-cluster
          juju integrate -m concierge-lxd:openstack-machines microovn:ovsdb sunbeam-ovn-proxy:ovsdb
          juju offer -c concierge-lxd openstack-machines.sunbeam-ovn-proxy:ovsdb-cms
          juju-wait -vw -m concierge-lxd:openstack-machines -t 1800 -r 3
      - name: Apply terraform
        run: |
          echo '{"cloud": "ci-k8s", "cloud-region": null, "credential": "ci-k8s", "external-ovsdb-cms-offer-url": "admin/openstack-machines.sunbeam-ovn-proxy", "enable-vault": true, "enable-barbican": true, "enable-designate": true, "nameservers": "testing.github.", "enable-watcher": true, "enable-consul-management": true, "enable-consul-tenant": true, "enable-consul-storage": true, "enable-ironic": true, "enable-manila": true, "enable-manila-cephfs": true, "enable-masakari": true, "enable-cloudkitty": true, "mysql-storage": { "database": "12G" }, "keystone-storage": { "fernet-keys": "6M", "credential-keys": "8M" } }' > terraform.tfvars.json
          juju switch concierge-lxd:testing-k8s
          terraform init
          terraform apply -auto-approve -var-file=channels/edge.tfvars
          juju integrate -m concierge-lxd:openstack-machines microovn:certificates "$(terraform output -raw ca-offer-url)"
          juju-wait -vw -m concierge-lxd:openstack -t 3600 -x cinder -x vault -x barbican -x cloudkitty -x ironic-conductor -x manila -x manila-cephfs -x neutron-baremetal-switch-config -x neutron-generic-switch-config -r 3
          juju-wait -vw -m concierge-lxd:openstack-machines -t 1800 -r 3
      - name: Collect juju status
        if: always()
        run: |
          sudo k8s status --output-format yaml
          juju status -m concierge-lxd:openstack
          juju debug-log -m concierge-lxd:openstack --replay
          juju status -m concierge-lxd:openstack-machines
          juju debug-log -m concierge-lxd:openstack-machines --replay
